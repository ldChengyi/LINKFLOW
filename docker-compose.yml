services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-linkflow}-web
    environment:
      - API_HOST=${API_HOST:-app}
      - API_PORT=${API_PORT:-8080}
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - app
    networks:
      - linkflow-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-linkflow}-app
    env_file:
      - .env
    expose:
      - "8080"
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - linkflow-network
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:2.25.1-pg15
    container_name: ${COMPOSE_PROJECT_NAME:-linkflow}-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD:-postgres}
      POSTGRES_DB: postgres
      DB_ADMIN_PASSWORD: ${DB_ADMIN_PASSWORD:-linkflow_admin}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD:-linkflow_app}
      DB_READ_PASSWORD: ${DB_READ_PASSWORD:-linkflow_read}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh:ro
      - ./scripts/init-db.sql.template:/docker-entrypoint-initdb.d/init-db.sql.template:ro
    networks:
      - linkflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-linkflow}-redis
    command: redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - linkflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  linkflow-network:
    driver: bridge
